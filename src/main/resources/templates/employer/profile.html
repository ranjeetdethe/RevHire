<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Company Profile')}"></head>

<body>
    <nav th:replace="~{fragments :: header}"></nav>

    <main class="container-xl py-5">
        <div class="row g-4">
            <!-- Sidebar / Company Preview -->
            <div class="col-lg-4">
                <div class="saas-card text-center mb-4">
                    <div class="d-inline-flex bg-slate-100 text-slate-400 rounded-xl align-items-center justify-content-center mb-3"
                        style="width: 100px; height: 100px;">
                        <i class="fas fa-building fa-3x"></i>
                    </div>
                    <h5 class="fw-bold text-slate-900 mb-1" th:text="${profile.companyName ?: 'Your Company'}">Company
                        Name</h5>
                    <p class="text-slate-500 text-sm mb-3" th:text="${profile.industry ?: 'Industry'}">Tech</p>

                    <div class="d-grid">
                        <button class="btn btn-outline-primary btn-sm">Upload Logo</button>
                    </div>
                </div>

                <div class="saas-card">
                    <h6 class="fw-bold mb-3">Profile Completion</h6>
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <div class="progress flex-grow-1" style="height: 6px;">
                            <div class="progress-bar bg-success" role="progressbar" style="width: 85%"></div>
                        </div>
                        <span class="text-xs fw-bold text-slate-600">85%</span>
                    </div>
                    <ul class="list-unstyled text-sm text-slate-500 m-0 d-flex flex-column gap-2">
                        <li class="d-flex align-items-center gap-2 text-success"><i class="fas fa-check-circle"></i>
                            Company Name</li>
                        <li class="d-flex align-items-center gap-2 text-success"><i class="fas fa-check-circle"></i>
                            Location</li>
                        <li class="d-flex align-items-center gap-2 text-slate-400"><i class="far fa-circle"></i> Social
                            Links</li>
                    </ul>
                </div>
            </div>

            <!-- Main Form -->
            <div class="col-lg-8">
                <div class="saas-card">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <div>
                            <h4 class="fw-bold text-slate-900 mb-1">Company Details</h4>
                            <p class="text-slate-500 text-sm m-0">Manage your company information and branding.</p>
                        </div>
                    </div>

                    <div th:if="${message}" class="alert alert-success d-flex align-items-center mb-4 rounded-lg"
                        role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${message}"></span>
                    </div>

                    <form th:action="@{/employer/profile}" method="post" th:object="${profile}">
                        <div class="row g-4">
                            <div class="col-md-12">
                                <label for="companyName" class="form-label text-sm fw-medium text-slate-700">Company
                                    Name</label>
                                <input type="text" class="form-control" id="companyName" name="companyName"
                                    th:value="${profile?.companyName}" required>
                            </div>

                            <div class="col-md-6">
                                <label for="location"
                                    class="form-label text-sm fw-medium text-slate-700">Headquarters</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-slate-400"><i
                                            class="fas fa-map-marker-alt"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="location"
                                        name="location" th:value="${profile?.location}" placeholder="City, State">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="website" class="form-label text-sm fw-medium text-slate-700">Website</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-slate-400"><i
                                            class="fas fa-globe"></i></span>
                                    <input type="url" class="form-control border-start-0 ps-0" id="website"
                                        name="website" th:value="${profile?.website}" placeholder="https://example.com">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="industry"
                                    class="form-label text-sm fw-medium text-slate-700">Industry</label>
                                <input type="text" class="form-control" id="industry" name="industry"
                                    th:value="${profile?.industry}" placeholder="e.g. Fintech, Healthcare">
                            </div>

                            <div class="col-md-6">
                                <label for="companySize" class="form-label text-sm fw-medium text-slate-700">Company
                                    Size</label>
                                <select class="form-select" id="companySize" name="companySize">
                                    <option value="" disabled selected>Select size</option>
                                    <option value="1-10" th:selected="${profile?.companySize == '1-10'}">1-10 Employees
                                    </option>
                                    <option value="11-50" th:selected="${profile?.companySize == '11-50'}">11-50
                                        Employees</option>
                                    <option value="51-200" th:selected="${profile?.companySize == '51-200'}">51-200
                                        Employees</option>
                                    <option value="201-500" th:selected="${profile?.companySize == '201-500'}">201-500
                                        Employees</option>
                                    <option value="500+" th:selected="${profile?.companySize == '500+'}">500+ Employees
                                    </option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="description" class="form-label text-sm fw-medium text-slate-700">About
                                    Company</label>
                                <textarea class="form-control" id="description" name="description" rows="5"
                                    th:text="${profile?.description}"
                                    placeholder="Tell us about your mission, culture, and values..."></textarea>
                            </div>

                            <div class="col-12 mt-4 pt-3 border-top d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4 py-2 fw-bold shadow-sm">Save
                                    Changes</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
</body>

</html>
