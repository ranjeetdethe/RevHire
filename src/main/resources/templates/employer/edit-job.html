<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Edit Job')}"></head>

<body>
    <nav th:replace="~{fragments :: header}"></nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex align-items-center mb-4">
                    <a href="/employer/dashboard" class="btn btn-outline-secondary btn-sm me-3"><i
                            class="fas fa-arrow-left"></i></a>
                    <div>
                        <h2 class="fw-bold text-slate-900 mb-1">Edit Job</h2>
                        <p class="text-slate-500 m-0">Update your job posting details.</p>
                    </div>
                </div>

                <div class="saas-card p-5">
                    <form th:action="@{'/employer/jobs/' + ${jobId} + '/edit'}" th:object="${jobDTO}" method="post">

                        <!-- Section 1: Job Basics -->
                        <div class="mb-5">
                            <h5 class="fw-bold text-primary mb-3"><i class="fas fa-briefcase me-2"></i> Job Details</h5>

                            <div class="mb-4">
                                <label for="title" class="form-label text-sm fw-medium text-slate-700">Job Title <span
                                        class="text-danger">*</span></label>
                                <input type="text" id="title" th:field="*{title}" class="form-control form-control-lg"
                                    placeholder="e.g. Senior Product Designer" required>
                                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"
                                    class="text-danger text-xs mt-1"></div>
                            </div>

                            <div class="mb-4">
                                <label for="description" class="form-label text-sm fw-medium text-slate-700">Job
                                    Description <span class="text-danger">*</span></label>
                                <textarea id="description" th:field="*{description}" rows="8" class="form-control"
                                    placeholder="Outline the responsibilities, requirements, and benefits..."
                                    required></textarea>
                                <div class="form-text text-xs text-slate-400 d-flex justify-content-between">
                                    <span>Be as detailed as possible to attract the right candidates.</span>
                                    <span>Min 10 chars</span>
                                </div>
                                <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}"
                                    class="text-danger text-xs mt-1"></div>
                            </div>
                        </div>

                        <!-- Section 2: Requirements & Location -->
                        <div class="mb-5">
                            <h5 class="fw-bold text-primary mb-3"><i class="fas fa-map-marker-alt me-2"></i> Location &
                                Requirements</h5>

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label for="location" class="form-label text-sm fw-medium text-slate-700">Location
                                        <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0 text-slate-400"><i
                                                class="fas fa-map-pin"></i></span>
                                        <input type="text" id="location" th:field="*{location}"
                                            class="form-control border-start-0 ps-0"
                                            placeholder="e.g. Remote, New York, NY" required>
                                    </div>
                                    <div th:if="${#fields.hasErrors('location')}" th:errors="*{location}"
                                        class="text-danger text-xs mt-1"></div>
                                </div>

                                <div class="col-md-6">
                                    <label for="experienceRequired"
                                        class="form-label text-sm fw-medium text-slate-700">Experience (Years) <span
                                            class="text-danger">*</span></label>
                                    <input type="number" id="experienceRequired" th:field="*{experienceRequired}"
                                        min="0" class="form-control" placeholder="e.g. 3" required>
                                    <div th:if="${#fields.hasErrors('experienceRequired')}"
                                        th:errors="*{experienceRequired}" class="text-danger text-xs mt-1"></div>
                                </div>

                                <div class="col-md-12">
                                    <label for="salaryRange" class="form-label text-sm fw-medium text-slate-700">Salary
                                        Range <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0 text-slate-400"><i
                                                class="fas fa-dollar-sign"></i></span>
                                        <input type="text" id="salaryRange" th:field="*{salaryRange}"
                                            class="form-control border-start-0 ps-0" placeholder="e.g. $100k - $140k"
                                            required>
                                    </div>
                                    <div th:if="${#fields.hasErrors('salaryRange')}" th:errors="*{salaryRange}"
                                        class="text-danger text-xs mt-1"></div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 pt-4 border-top">
                            <a href="/employer/dashboard" class="btn btn-secondary px-4 py-2 fw-bold">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-lg">Update
                                Job</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
</body>

</html>
