<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Something went wrong')}"></head>

<body class="bg-body d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments :: header}"></nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="saas-card p-5 border-0 shadow-lg position-relative overflow-hidden">
                        <!-- Decorative Background Blob -->
                        <div class="position-absolute top-0 start-0 w-100 h-100 bg-primary opacity-5"
                            style="transform: scale(1.5);"></div>

                        <div class="position-relative z-1">
                            <i class="fas fa-ghost fa-6x text-primary-light mb-4 floating-animation"></i>

                            <h1 class="display-4 fw-bold text-slate-900 mb-2">Oops!</h1>
                            <h4 class="text-slate-600 fw-medium mb-4">We lost that page in the cloud.</h4>

                            <p class="text-slate-500 mb-5 max-w-md mx-auto"
                                th:text="${error ?: 'The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.'}">
                                Error details here...
                            </p>

                            <div class="d-flex justify-content-center gap-3">
                                <a href="/" class="btn btn-primary px-4 py-2 fw-bold shadow-sm">
                                    <i class="fas fa-home me-2"></i> Return Home
                                </a>
                                <a href="javascript:history.back()"
                                    class="btn btn-outline-secondary px-4 py-2 fw-medium">
                                    <i class="fas fa-arrow-left me-2"></i> Go Back
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

    <style>
        .floating-animation {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</body>

</html>
