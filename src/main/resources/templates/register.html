<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:replace="~{fragments :: head('Register')}"></title>
</head>

<body class="bg-body overflow-hidden">

    <div class="row min-vh-100 g-0">
        <!-- Left Side: Visual/Brand -->
        <div class="col-lg-5 d-none d-lg-flex flex-column justify-content-center p-5 position-relative text-white"
            style="background: linear-gradient(135deg, var(--primary-dark) 0%, #1e1b4b 100%);">
            <div class="position-absolute top-0 start-0 w-100 h-100"
                style="background-image: url('https://images.unsplash.com/photo-1557804506-669a67965ba0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1267&q=80'); background-size: cover; background-position: center; opacity: 0.1;">
            </div>

            <div class="position-relative z-1" style="max-width: 480px; margin: 0 auto;">
                <div class="mb-5">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center mb-4"
                        style="width: 48px; height: 48px;">
                        <i class="fas fa-bolt fa-lg"></i>
                    </div>
                    <h1 class="display-5 fw-bold mb-3">Start your journey today.</h1>
                    <ul class="list-unstyled opacity-75 mt-4 d-flex flex-column gap-3 text-lg">
                        <li class="d-flex align-items-center gap-3"><i class="fas fa-check-circle text-success"></i>
                            Access to premium job listings</li>
                        <li class="d-flex align-items-center gap-3"><i class="fas fa-check-circle text-success"></i>
                            Direct messaging withrecruiters</li>
                        <li class="d-flex align-items-center gap-3"><i class="fas fa-check-circle text-success"></i>
                            Smart salary insights</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Right Side: Register Form -->
        <div class="col-lg-7 d-flex flex-column align-items-center bg-white h-100 overflow-auto">
            <div class="w-100 py-5" style="max-width: 580px; padding: 2rem;">

                <div class="text-center d-lg-none mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                        style="width: 48px; height: 48px;">
                        <i class="fas fa-bolt fa-lg"></i>
                    </div>
                </div>

                <div class="mb-5 text-center text-lg-start">
                    <h2 class="fw-bold text-slate-900 mb-2">Create an Account</h2>
                    <p class="text-slate-500">Join thousands of professionals on RevHire.</p>
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <!-- Global Error Message -->
                    <div th:if="${error}" class="alert alert-danger d-flex align-items-center rounded-lg mb-4"
                        role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span th:text="${error}">Error message</span>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label for="firstName" class="form-label text-sm fw-medium text-slate-700">First
                                Name</label>
                            <input type="text" th:field="*{firstName}" id="firstName" class="form-control"
                                placeholder="John" required>
                            <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"
                                class="text-danger text-xs mt-1"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lastName" class="form-label text-sm fw-medium text-slate-700">Last Name</label>
                            <input type="text" th:field="*{lastName}" id="lastName" class="form-control"
                                placeholder="Doe" required>
                            <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"
                                class="text-danger text-xs mt-1"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-sm fw-medium text-slate-700">Email Address</label>
                        <input type="email" th:field="*{email}" id="email" class="form-control"
                            placeholder="john@example.com" required>
                        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                            class="text-danger text-xs mt-1"></div>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label text-sm fw-medium text-slate-700">Phone Number</label>
                        <input type="tel" th:field="*{phone}" id="phone" class="form-control"
                            placeholder="+1 (555) 000-0000">
                        <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"
                            class="text-danger text-xs mt-1"></div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-sm fw-medium text-slate-700">Password</label>
                        <input type="password" th:field="*{password}" id="password" class="form-control"
                            placeholder="Create a strong password" required>
                        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                            class="text-danger text-xs mt-1"></div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="securityQuestion" class="form-label text-sm fw-medium text-slate-700">Security
                                Question</label>
                            <select th:field="*{securityQuestion}" id="securityQuestion" class="form-select">
                                <option value="" disabled selected>Select a question</option>
                                <option value="What is your mother's maiden name?">What is your mother's maiden name?
                                </option>
                                <option value="What was the name of your first pet?">What was the name of your first
                                    pet?</option>
                                <option value="What city were you born in?">What city were you born in?</option>
                                <option value="What is your favorite color?">What is your favorite color?</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="securityAnswer"
                                class="form-label text-sm fw-medium text-slate-700">Answer</label>
                            <input type="text" th:field="*{securityAnswer}" id="securityAnswer" class="form-control"
                                placeholder="Your answer" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-sm fw-medium text-slate-700 d-block mb-2">I want to...</label>
                        <div class="row g-3">
                            <div class="col-6">
                                <input type="radio" class="btn-check" th:field="*{role}" value="JOB_SEEKER"
                                    id="roleSeeker" autocomplete="off" checked>
                                <label
                                    class="btn btn-outline-primary w-100 p-3 rounded-xl d-flex flex-column align-items-center gap-2 h-100"
                                    for="roleSeeker">
                                    <i class="fas fa-user-astronaut fa-2x"></i>
                                    <span class="fw-bold">Find a Job</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <input type="radio" class="btn-check" th:field="*{role}" value="EMPLOYER"
                                    id="roleEmployer" autocomplete="off">
                                <label
                                    class="btn btn-outline-primary w-100 p-3 rounded-xl d-flex flex-column align-items-center gap-2 h-100"
                                    for="roleEmployer">
                                    <i class="fas fa-building fa-2x"></i>
                                    <span class="fw-bold">Hire Talent</span>
                                </label>
                            </div>
                        </div>
                        <div th:if="${#fields.hasErrors('role')}" th:errors="*{role}"
                            class="text-danger small mt-1 d-block text-center"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-lg fw-bold shadow-sm mb-4">Create
                        Account</button>

                    <div class="text-center text-slate-500 text-sm">
                        Already have an account? <a href="/login" class="text-primary fw-bold text-decoration-none">Log
                            In</a>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <a href="/" class="text-slate-400 hover-text-slate-600 text-sm text-decoration-none transition-all">
                        <i class="fas fa-arrow-left me-1"></i> Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
