server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Any route that doesn't have a file extension (e.g. /job-seeker) 
    # will be routed to index.html so Angular handles the routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optionally proxy /api requests to the backend Spring Boot app
    location /api/ {
        proxy_pass http://app:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
