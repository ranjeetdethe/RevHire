<div class="notifications-wrapper min-vh-100" style="font-family: 'Inter', sans-serif;">
    <div class="container py-4">

        <!-- Header -->
        <div class="mb-4">
            <h3 class="fw-bold text-dark font-heading mb-2">Notifications</h3>
            <p class="text-muted small fw-medium">Stay updated on your application status, interviews, and account
                activity.</p>
        </div>

        <!-- Main Notification Container -->
        <div class="bg-white rounded-4 shadow-sm border p-4">

            <!-- Controls (Search & Filters) -->
            <div class="d-flex flex-column flex-md-row justify-content-end align-items-md-center gap-3 mb-4">
                <div class="search-input-wrapper position-relative" style="max-width: 300px; width: 100%;">
                    <input type="text"
                        class="form-control form-control-sm border rounded-pill shadow-none px-3 py-2 text-dark small bg-light"
                        placeholder="Search notifications...">
                </div>
            </div>

            <div class="d-flex justify-content-end align-items-center gap-3 mb-4 flex-wrap">
                <button class="btn btn-light rounded-2 py-1 px-3 small fw-medium border shadow-sm">All</button>
                <button
                    class="btn btn-link text-decoration-none text-muted p-0 small fw-medium custom-link-hover">Read</button>
                <button
                    class="btn btn-link text-decoration-none text-muted p-0 small fw-medium custom-link-hover">Unread</button>
                <button class="btn btn-link text-decoration-none text-dark p-0 small fw-medium custom-link-hover"
                    (click)="markAllAsRead()">Mark All as Read</button>
            </div>

            <!-- Skeleton Loader -->
            <div *ngIf="isLoading" class="d-flex flex-column gap-3">
                <div class="col-12" *ngFor="let i of [1,2,3,4]">
                    <div class="p-3 placeholder-glow border rounded-4 bg-light bg-opacity-50">
                        <div class="d-flex align-items-center gap-3">
                            <span class="placeholder rounded-circle bg-secondary opacity-25"
                                style="width: 50px; height: 50px;"></span>
                            <div class="flex-grow-1">
                                <span class="placeholder col-4 bg-secondary opacity-25 d-block mb-2"></span>
                                <span class="placeholder col-8 bg-secondary opacity-25 d-block"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div *ngIf="!isLoading">

                <!-- Empty State -->
                <div *ngIf="notifications.length === 0" class="text-center py-5">
                    <i class="bi bi-bell-slash display-4 text-muted mb-3 d-block opacity-25"></i>
                    <h5 class="fw-bold text-dark">No Notifications</h5>
                    <p class="text-muted small">You don't have any notifications at the moment.</p>
                </div>

                <!-- Notifications List (Matching mock visually if real ones are standard) -->
                <div class="d-flex flex-column gap-3" *ngIf="notifications.length > 0">

                    <!-- We map actual notifications data, falling back to visually matched icons/styles -->
                    <div class="notification-card border rounded-4 p-3 d-flex position-relative transition-hover bg-white"
                        *ngFor="let notif of notifications" [ngClass]="{'opacity-75': notif.isRead}">

                        <div class="d-flex align-items-start gap-4 w-100 ps-2">
                            <!-- Icon Circle -->
                            <div class="icon-circle border rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 shadow-sm"
                                style="width: 56px; height: 56px;" [ngClass]="{
                                    'bg-primary bg-opacity-10 text-primary border-primary border-opacity-25': !notif.isRead,
                                    'bg-light text-muted border-secondary border-opacity-25': notif.isRead
                                }">
                                <i class="bi fs-4" [ngClass]="{
                                    'bi-hand-thumbs-up-fill': (notif.title || '').includes('Status') && !(notif.title || '').includes('REJECTED'),
                                    'bi-chat-left-text-fill': (notif.title || '').includes('Message'),
                                    'bi-calendar-event': (notif.title || '').includes('Interview'),
                                    'bi-hand-index-thumb-fill text-danger': (notif.title || '').includes('REJECTED'),
                                    'bi-person-fill': (notif.title || '').includes('Profile View'),
                                    'bi-bell-fill': true
                                }"></i>
                            </div>

                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start mb-1">
                                    <h6 class="fw-bold text-dark mb-0 fs-6">{{ notif.title || 'Notification' }}</h6>
                                    <span class="text-muted small fw-medium text-nowrap mt-1">{{ notif.createdAt |
                                        date:'shortTime' }}</span>
                                </div>
                                <p class="text-dark small mb-3 me-md-5">{{ notif.message }}</p>

                                <div class="d-flex justify-content-end gap-3 actions-row">
                                    <button
                                        class="btn btn-link text-decoration-none text-muted small fw-medium p-0 d-flex align-items-center gap-1 action-btn"
                                        (click)="handleNotificationClick(notif)" *ngIf="!notif.isRead">
                                        <i class="bi bi-check-circle"></i> Mark as Read
                                    </button>
                                    <button
                                        class="btn btn-link text-decoration-none text-muted small fw-medium p-0 d-flex align-items-center gap-1 action-btn"
                                        (click)="deleteNotification(notif.id, $event)">
                                        <i class="bi bi-trash3"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer Pagination -->
                <div class="d-flex justify-content-center mt-4">
                    <div class="d-flex align-items-center gap-2">
                        <button
                            class="btn btn-sm btn-light border p-1 rounded-2 d-flex align-items-center justify-content-center"
                            style="width: 28px; height: 28px;" disabled>
                            <i class="bi bi-chevron-left text-muted"></i>
                        </button>
                        <span class="small fw-medium text-dark px-2">1 of 3</span>
                        <button
                            class="btn btn-sm btn-light border p-1 rounded-2 d-flex align-items-center justify-content-center"
                            style="width: 28px; height: 28px;">
                            <i class="bi bi-chevron-right text-dark"></i>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<app-toast [message]="toastMessage" [type]="toastType" [show]="showToast"></app-toast>
