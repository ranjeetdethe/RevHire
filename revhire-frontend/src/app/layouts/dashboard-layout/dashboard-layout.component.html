<div class="d-flex flex-column min-vh-100 bg-light">

    <!-- ===== SINGLE NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top py-3"
        style="font-family: var(--font-heading);">
        <div class="container-fluid px-4 mx-auto" style="max-width: 1400px;">

            <!-- Logo -->
            <a class="navbar-brand fw-bold text-primary fs-3 d-flex align-items-center"
                routerLink="/job-seeker/dashboard">
                <i class="bi bi-briefcase-fill me-2"></i> RevHire
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#jsNavbarCore">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="jsNavbarCore">

                <!-- LEFT NAV -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4 fw-medium text-muted">
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/job-seeker/dashboard">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/job-seeker/search-jobs">Search Jobs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/job-seeker/my-applications">My Applications</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/job-seeker/saved-jobs">Saved Jobs</a>
                    </li>
                </ul>

                <!-- RIGHT SIDE -->
                <div class="d-flex align-items-center gap-3">

                    <!-- 🔔 Notification -->
                    <a routerLink="/job-seeker/notifications" class="btn btn-link text-dark position-relative p-2">
                        <i class="bi bi-bell-fill fs-5"></i>
                        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle"
                            *ngIf="unreadCount > 0">
                            {{ unreadCount > 99 ? '99+' : unreadCount }}
                        </span>
                    </a>

                    <!-- 👤 USER DROPDOWN -->
                    <div class="dropdown position-relative">

                        <div class="d-flex align-items-center gap-2 cursor-pointer" (click)="toggleDropdown($event)"
                            style="cursor:pointer;">
                            <div class="avatar">
                                {{ user?.firstName?.charAt(0) || 'U' | uppercase }}
                            </div>
                            <span class="fw-semibold d-none d-sm-block">
                                {{ user?.firstName || 'Account' }}
                            </span>
                            <i class="bi bi-chevron-down small"></i>
                        </div>

                        <!-- ✅ DROPDOWN -->
                        <ul class="dropdown-menu dropdown-menu-end shadow-lg rounded-4 overflow-hidden"
                            [class.show]="isDropdownOpen" [style.display]="isDropdownOpen ? 'block' : 'none'"
                            style="position: absolute; top: 100%; right: 0; z-index: 1050; min-width: 200px;">
                            <li class="px-4 py-3 bg-light border-bottom">
                                <div class="fw-bold">
                                    {{ user?.firstName }} {{ user?.lastName }}
                                </div>
                                <small class="text-muted">{{ user?.email }}</small>
                            </li>

                            <li>
                                <button class="dropdown-item" (click)="navigateToProfile()">
                                    <i class="bi bi-person-circle me-2"></i>
                                    View Profile
                                </button>
                            </li>

                            <li>
                                <hr class="dropdown-divider" />
                            </li>

                            <li>
                                <button class="dropdown-item text-danger fw-bold" (click)="onLogout()">
                                    <i class="bi bi-box-arrow-right me-2"></i>
                                    Logout
                                </button>
                            </li>
                        </ul>
                    </div>

                </div>
            </div>
        </div>
    </nav>

    <!-- ===== PAGE CONTENT (FULL WIDTH, RESPONSIVE) ===== -->
    <div class="container-fluid flex-grow-1">
        <div class="row pt-4 pb-5 h-100 mx-auto" style="max-width: 1400px;">
            <div class="col-12">

                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
</div>
